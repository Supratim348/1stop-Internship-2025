<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="vendor/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="icon" href="assets/money-bag.png">
    <style>
        * { user-select: none; }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a href="#" class="navbar-brand d-flex align-items-center fw-bold">
                <img src="assets/money-bag.png" class="me-2" alt="logo" width="32">
                Expense Tracker
            </a>
            <div class="d-flex align-items-center">
                <span class="text-muted small me-3 d-none d-md-inline">Internal Accounting Tool</span>
                <button class="btn btn-primary shadow-sm" onclick="showExpenseModal()">
                    <i class="bi bi-plus-lg me-2"></i>New Expense
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">

            <!-- Stats Card -->
            <div class="col-12 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <p class="text-uppercase text-muted fw-semibold small mb-1 ls-1">Total Cumulative Spent</p>
                                <div class="display-6 fw-bold text-dark" id="totalSpent">$0.00</div>
                            </div>
                            <div class="col-md-6 text-md-end">
                                <p class="text-muted small mb-0">Calculated from local browser storage</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="col-12">
                <div class="card shadow-sm border-0 overflow-hidden">
                    <div class="card-header bg-white border-bottom py-3">
                        <h6 class="mb-0 fw-bold">Detailed Transaction History</h6>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-uppercase text-muted small fw-semibold ps-4" width="100">Index</th>
                                    <th class="text-uppercase text-muted small fw-semibold">Description</th>
                                    <th class="text-uppercase text-muted small fw-semibold">Date Added</th>
                                    <th class="text-uppercase text-muted small fw-semibold text-end pe-4">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="expenseTableBody">
                                <!-- populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="addExpenseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light border-bottom">
                    <h5 class="modal-title fw-bold">Record New Expense</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addExpenseForm">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Expense Description</label>
                            <textarea class="form-control" name="description" rows="2" placeholder="Describe the transaction..." required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Date</label>
                                <input type="date" class="form-control" name="date" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Spent Amount ($)</label>
                                <input type="number" class="form-control" name="spent" step="0.01" min="0.01" placeholder="0.00" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer bg-light border-0">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Discard</button>
                        <button type="button" class="btn btn-primary px-4" onclick="saveExpense()">Finalize Entry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="vendor/jquery/jquery.js"></script>
    <script src="vendor/popper/popper.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.js"></script>

    <script>
        function formatCurrency(value) {
            return "$" + parseFloat(value).toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        $(document).ready(function () {
            createTableFromJSON();
            getTotalExpenditure();
        });

        function showExpenseModal() {
            $("#addExpenseModal").modal('show');
        }

        function saveExpense() {
            const form = document.getElementById('addExpenseForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }

            const spentValue = parseFloat(form.querySelector('[name="spent"]').value);
            if (isNaN(spentValue) || spentValue <= 0) {
                alert("Please enter a valid amount greater than $0.00.");
                return;
            }

            var dataArr = $("#addExpenseForm").serializeArray();
            var expenseObject = {};
            dataArr.forEach(item => expenseObject[item.name] = item.value);

            var storage = JSON.parse(localStorage.getItem("expenseStorage") || "[]");
            storage.push(expenseObject);
            localStorage.setItem("expenseStorage", JSON.stringify(storage));

            $("#addExpenseModal").modal('hide');
            form.reset();
            createTableFromJSON();
            getTotalExpenditure();
        }

        function createTableFromJSON() {
            var storage = JSON.parse(localStorage.getItem('expenseStorage') || "[]");
            var html = "";
            if (storage.length > 0) {
                storage.forEach((item, i) => {
                    html += `<tr>
                        <td class="ps-4"><span class="text-muted fw-bold">${i + 1}</span></td>
                        <td class="fw-semibold">${item.description}</td>
                        <td><span class="badge bg-light text-secondary border">${item.date}</span></td>
                        <td class="text-end pe-4 fw-bold text-primary">${formatCurrency(item.spent)}</td>
                    </tr>`;
                });
            } else {
                html = '<tr><td colspan="4" class="text-center py-5 text-muted">No accounting data found.</td></tr>';
            }
            $("#expenseTableBody").html(html);
        }

        function getTotalExpenditure() {
            var storage = JSON.parse(localStorage.getItem('expenseStorage') || "[]");
            var total = storage.reduce((acc, curr) => acc + parseFloat(curr.spent || 0), 0);
            $("#totalSpent").text(formatCurrency(total));
        }
    </script>
</body>
</html>
