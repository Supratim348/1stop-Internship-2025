<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro</title>
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.css">
    <style>
        * { user-select: none; }
        body { background-color: #f1f5f9; }
    </style>
</head>
<body>

    <div class="container pb-5">

        <!-- Header -->
        <div class="text-center py-5">
            <div class="bg-white rounded-3 shadow-sm d-inline-flex align-items-center justify-content-center mb-3" style="width:70px;height:70px;">
                <img src="assets/to-do-list.png" alt="logo" width="40">
            </div>
            <h2 class="fw-bold m-0">TaskMaster Pro</h2>
            <p class="text-muted small">Efficiently managing your daily objectives</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0">Current Tasks</h5>
                    <button class="btn btn-primary shadow-sm" onclick="showAddTaskModal()">
                        + New Task
                    </button>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3" width="60">ID</th>
                                    <th>Task</th>
                                    <th>Assignee</th>
                                    <th>ETA</th>
                                    <th class="text-end pe-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="taskTableBody">
                                <!-- JS items -->
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-light d-flex justify-content-between align-items-center text-muted small">
                        <span id="taskCount">Total Tasks: 0</span>
                        <span class="text-muted opacity-50">Updates automatically</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal fade" id="addTaskModal" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <form id="taskInputForm">
                    <div class="modal-header bg-light border-0">
                        <h5 class="modal-title fw-bold">Create Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Task Description</label>
                            <textarea class="form-control" name="taskDescription" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold small">Responsible</label>
                                <input type="text" class="form-control" name="taskResponsiblePerson" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold small">ETA</label>
                                <input type="datetime-local" class="form-control" name="taskETA" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer bg-light border-0">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary px-4" onclick="addTask()">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Update Task Modal -->
    <div class="modal fade" id="updateTaskModal" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <form id="taskUpdateForm">
                    <div class="modal-header bg-light border-0">
                        <h5 class="modal-title fw-bold">Update Details</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Description</label>
                            <textarea class="form-control" id="editTaskTextArea" name="taskDescription" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold small">Responsible</label>
                                <input type="text" class="form-control" id="editResponsiblePerson" name="taskResponsiblePerson" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold small">ETA</label>
                                <input type="datetime-local" class="form-control" id="editETA" name="taskETA" required>
                            </div>
                        </div>
                        <input type="hidden" id="editIndex" name="taskIndex">
                    </div>
                    <div class="modal-footer bg-light border-0">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Discard</button>
                        <button type="button" class="btn btn-primary px-4" onclick="updateTask()">Update Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts (all local now) -->
    <script src="vendor/jQuery/jquery.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.js"></script>

    <script>
        $(document).ready(function () { createHtmlfromStorage(); });

        function showAddTaskModal() { $("#addTaskModal").modal('show'); }

        function addTask() {
            const form = document.getElementById('taskInputForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }

            var dataArr = $("#taskInputForm").serializeArray();
            var task = {};
            dataArr.forEach(i => task[i.name] = i.value);

            var storage = JSON.parse(localStorage.getItem('taskStorage') || '[]');
            storage.push(task);
            localStorage.setItem('taskStorage', JSON.stringify(storage));

            $("#addTaskModal").modal('hide');
            $("#taskInputForm").trigger('reset');
            createHtmlfromStorage();
        }

        function formatETA(value) {
            if (!value) return "No ETA set";
            var d = new Date(value);
            if (isNaN(d.getTime())) return "No ETA set";
            return d.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
        }

        function createHtmlfromStorage() {
            var storage = JSON.parse(localStorage.getItem('taskStorage') || '[]');
            var html = '';
            $("#taskCount").text("Total Tasks: " + storage.length);

            if (storage.length > 0) {
                storage.forEach((item, i) => {
                    html += `<tr>
                        <td class="text-muted small ps-3">#${i + 1}</td>
                        <td class="fw-semibold">${item.taskDescription}</td>
                        <td><span class="badge bg-primary-subtle text-primary-emphasis">${item.taskResponsiblePerson}</span></td>
                        <td class="text-muted small">${formatETA(item.taskETA)}</td>
                        <td class="text-end pe-3">
                            <button class="btn btn-sm btn-outline-success me-1" onclick="markAsDone(${i})" title="Complete">Done</button>
                            <button class="btn btn-sm btn-outline-primary" onclick="editTask(${i})" title="Edit">Edit</button>
                        </td>
                    </tr>`;
                });
            } else {
                html = '<tr><td colspan="5" class="text-center py-5 text-muted opacity-50">No tasks currently active.</td></tr>';
            }
            $("#taskTableBody").html(html);
        }

        // FIX: "done" tasks are now archived to a separate completedTasks list
        // instead of being silently deleted with no record.
        function markAsDone(index) {
            var storage = JSON.parse(localStorage.getItem('taskStorage') || '[]');
            var completed = JSON.parse(localStorage.getItem('completedTasks') || '[]');

            var task = storage[index];
            if (!task) return;

            task.completedAt = new Date().toISOString();
            completed.push(task);
            storage.splice(index, 1);

            localStorage.setItem('taskStorage', JSON.stringify(storage));
            localStorage.setItem('completedTasks', JSON.stringify(completed));
            createHtmlfromStorage();
        }

        function editTask(index) {
            var storage = JSON.parse(localStorage.getItem('taskStorage') || '[]');
            var t = storage[index];
            if (!t) return;
            $("#editTaskTextArea").val(t.taskDescription);
            $("#editResponsiblePerson").val(t.taskResponsiblePerson);
            $("#editETA").val(t.taskETA);
            $("#editIndex").val(index);
            $("#updateTaskModal").modal('show');
        }

        function updateTask() {
            const form = document.getElementById('taskUpdateForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }

            var dataArr = $("#taskUpdateForm").serializeArray();
            var task = {};
            dataArr.forEach(i => task[i.name] = i.value);

            var storage = JSON.parse(localStorage.getItem('taskStorage') || '[]');
            // FIX: taskIndex from serializeArray() is a string; coerce to a number
            // before using it as an array index to avoid silent mismatches.
            var idx = parseInt(task.taskIndex, 10);
            if (isNaN(idx) || idx < 0 || idx >= storage.length) return;

            delete task.taskIndex;
            storage[idx] = task;
            localStorage.setItem('taskStorage', JSON.stringify(storage));

            $("#updateTaskModal").modal('hide');
            createHtmlfromStorage();
        }
    </script>
</body>
</html>
